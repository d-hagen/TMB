<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMB Lost &amp; Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e1e4e8;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #58a6ff; }
    .container { width: 100%; max-width: 640px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #30363d; }
    .tab {
      padding: 0.6rem 1.5rem; cursor: pointer; font-weight: 600; font-size: 1rem;
      color: #8b949e; border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab:hover { color: #e1e4e8; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* Form */
    form, .find-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    }
    label {
      font-size: 0.85rem; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    input, select, textarea {
      width: 100%; padding: 0.6rem 0.8rem;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e1e4e8; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #58a6ff; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    button[type="submit"], .action-btn {
      padding: 0.7rem; background: #238636; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button[type="submit"]:hover, .action-btn:hover { background: #2ea043; }
    button[type="submit"]:disabled, .action-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .status-msg {
      margin-top: 0.75rem; padding: 0.6rem; border-radius: 6px; font-size: 0.9rem; display: none;
    }
    .status-msg.ok  { display: block; background: #0d2818; border: 1px solid #238636; color: #3fb950; }
    .status-msg.err { display: block; background: #2d1117; border: 1px solid #da3633; color: #f85149; }

    h2 { margin-top: 2rem; margin-bottom: 0.75rem; font-size: 1.2rem; color: #8b949e; }
    table {
      width: 100%; border-collapse: collapse; background: #161b22;
      border: 1px solid #30363d; border-radius: 8px; overflow: hidden; font-size: 0.85rem;
    }
    th {
      background: #21262d; text-align: left; padding: 0.5rem 0.6rem;
      color: #8b949e; font-weight: 600; text-transform: uppercase;
      font-size: 0.75rem; letter-spacing: 0.04em;
    }
    td { padding: 0.5rem 0.6rem; border-top: 1px solid #21262d; }
    tr:hover td { background: #1c2128; }
    .empty-msg { text-align: center; color: #484f58; padding: 2rem; font-style: italic; }
    .delete-btn {
      background: none; border: none; color: #f85149; cursor: pointer;
      font-size: 0.8rem; padding: 2px 6px; border-radius: 4px;
    }
    .delete-btn:hover { background: #2d1117; }

    /* Camera & upload */
    #detectBtn {
      padding: 0.7rem; background: #1f6feb; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%;
    }
    #detectBtn:hover { background: #388bfd; }
    #detectBtn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .upload-btn {
      padding: 0.7rem; background: #6e40c9; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
      text-align: center; transition: background 0.2s;
    }
    .upload-btn:hover { background: #8957e5; }
    .detect-status {
      font-size: 0.85rem; color: #8b949e; text-align: center; min-height: 0; display: none;
    }
    .detect-status.active { display: block; }
    #cameraBox {
      display: none; flex-direction: column; gap: 0.75rem; align-items: center;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      padding: 1rem; margin-top: 0.5rem;
    }
    #cameraBox.active { display: flex; }
    #cameraVideo { width: 100%; max-width: 480px; border-radius: 6px; background: #000; }
    #captureBtn {
      padding: 0.5rem 1.5rem; background: #da3633; color: #fff; border: none;
      border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    #captureBtn:hover { background: #f85149; }
    #cameraCanvas { display: none; }
    #detectStatus { font-size: 0.85rem; color: #8b949e; text-align: center; min-height: 1.2em; }
    .pulse { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Connected items banner */
    .link-banner {
      background: #0d2818; border: 1px solid #238636; border-radius: 8px;
      padding: 1rem; display: none; flex-direction: column; gap: 0.75rem;
    }
    .link-banner.active { display: flex; }
    .link-banner p { color: #3fb950; font-size: 0.95rem; }
    .link-banner .link-actions { display: flex; gap: 0.5rem; }
    .link-btn {
      padding: 0.5rem 1rem; border: none; border-radius: 6px;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .link-btn-add { background: #1f6feb; color: #fff; }
    .link-btn-add:hover { background: #388bfd; }
    .link-btn-done { background: #30363d; color: #e1e4e8; }
    .link-btn-done:hover { background: #484f58; }

    /* Connected IDs in table */
    .conn-id {
      display: inline-block; background: #1f6feb22; color: #58a6ff;
      border-radius: 3px; padding: 1px 5px; font-size: 0.8rem; margin: 1px;
    }

    /* Chat */
    .chat-container {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      display: flex; flex-direction: column; height: 520px;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem; display: flex;
      flex-direction: column; gap: 0.75rem;
    }
    .chat-msg {
      max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 12px;
      font-size: 0.95rem; line-height: 1.45; word-wrap: break-word;
    }
    .chat-msg.user {
      align-self: flex-end; background: #1f6feb; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.assistant {
      align-self: flex-start; background: #21262d; color: #e1e4e8;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.thinking {
      align-self: flex-start; background: #21262d; color: #8b949e; font-style: italic;
    }
    .chat-input-row {
      display: flex; gap: 0.5rem; padding: 0.75rem; border-top: 1px solid #30363d;
    }
    .chat-input-row input { flex: 1; border-radius: 20px; padding: 0.5rem 1rem; }
    .chat-send {
      background: #1f6feb; color: #fff; border: none; border-radius: 20px;
      padding: 0.5rem 1.2rem; font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .chat-send:hover { background: #388bfd; }
    .chat-send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    .chat-new {
      background: #30363d; color: #8b949e; border: none; border-radius: 20px;
      padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.8rem;
    }
    .chat-new:hover { background: #484f58; color: #e1e4e8; }
    #findMatches { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TMB Lost &amp; Found</h1>

    <div class="tabs">
      <button class="tab active" data-screen="catalogScreen">Catalog</button>
      <button class="tab" data-screen="findScreen">Find</button>
    </div>

    <!-- ═══════ CATALOG SCREEN ═══════ -->
    <div id="catalogScreen" class="screen active">
      <!-- Link banner (shown after saving an item) -->
      <div class="link-banner" id="linkBanner">
        <p id="linkMsg">Item saved! Want to add connected items (e.g. items inside a bag)?</p>
        <div class="link-actions">
          <button class="link-btn link-btn-add" id="linkAddBtn">Add Connected Item</button>
          <button class="link-btn link-btn-done" id="linkDoneBtn">Done</button>
        </div>
      </div>

      <form id="entryForm">
        <div class="row">
          <button type="button" id="detectBtn">Detect (Camera)</button>
          <label class="upload-btn">
            Upload Photo
            <input type="file" id="uploadInput" accept="image/*" hidden>
          </label>
        </div>
        <div id="uploadStatus" class="detect-status"></div>
        <div id="cameraBox">
          <video id="cameraVideo" autoplay playsinline></video>
          <canvas id="cameraCanvas"></canvas>
          <button type="button" id="captureBtn">Capture &amp; Detect</button>
          <div id="detectStatus"></div>
        </div>

        <div class="field">
          <label for="station">Station</label>
          <input type="text" id="station" name="station" placeholder="e.g. L4, N12" required>
        </div>

        <div class="field">
          <label for="item_type">Item Type</label>
          <input type="text" id="item_type" name="item_type" placeholder="e.g. Blue ballpoint pen" required>
        </div>

        <div class="row">
          <div class="field">
            <label for="main_color">Main Color</label>
            <input type="text" id="main_color" name="main_color" placeholder="e.g. black, dark blue">
          </div>
          <div class="field">
            <label for="secondary_colors">Secondary Colors</label>
            <input type="text" id="secondary_colors" name="secondary_colors" placeholder="e.g. grey, white">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="perks">Perks / Features</label>
            <input type="text" id="perks" name="perks" placeholder="e.g. Nike logo, scuffed">
          </div>
          <div class="field">
            <label for="time">Time</label>
            <input type="datetime-local" id="time" name="time" required>
          </div>
        </div>

        <button type="submit" id="submitBtn">Add Entry</button>
        <div id="status" class="status-msg"></div>
      </form>

      <h2>Entries</h2>
      <div id="entries"></div>
    </div>

    <!-- ═══════ FIND SCREEN ═══════ -->
    <div id="findScreen" class="screen">
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-msg assistant">Hello! I can help you find a lost item. Please describe it in as much detail as possible — item type, colors, when and where you lost it, and any distinguishing features.</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Describe your lost item..." autocomplete="off">
          <button class="chat-send" id="chatSend">Send</button>
          <button class="chat-new" id="chatNew" title="Start over">New</button>
        </div>
      </div>
      <div id="findMatches"></div>
    </div>
  </div>

  <script>
    // ─── Tab switching ────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.screen).classList.add('active');
      });
    });

    const form = document.getElementById('entryForm');
    const status = document.getElementById('status');
    const entriesDiv = document.getElementById('entries');
    const linkBanner = document.getElementById('linkBanner');
    const linkMsg = document.getElementById('linkMsg');
    const linkAddBtn = document.getElementById('linkAddBtn');
    const linkDoneBtn = document.getElementById('linkDoneBtn');
    const submitBtn = document.getElementById('submitBtn');

    let linkToId = null;       // ID of parent item we're linking to
    let lastSavedId = null;    // ID of last saved item
    let lastStation = '';
    let lastTime = '';

    function setTimeNow() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('time').value = now.toISOString().slice(0, 16);
    }
    setTimeNow();

    function showStatus(el, msg, ok) {
      el.textContent = msg;
      el.className = 'status-msg ' + (ok ? 'ok' : 'err');
      setTimeout(() => { el.className = 'status-msg'; }, 4000);
    }

    // ─── Connected Items Workflow ─────────────────────────────
    function showLinkBanner(parentId) {
      lastSavedId = parentId;
      linkMsg.textContent = `Item #${parentId} saved! Add connected items (e.g. items found inside)?`;
      linkBanner.classList.add('active');
    }

    function hideLinkBanner() {
      linkBanner.classList.remove('active');
      linkToId = null;
      lastSavedId = null;
      submitBtn.textContent = 'Add Entry';
    }

    linkAddBtn.addEventListener('click', () => {
      // Start adding a connected item — keep station & time, clear the rest
      linkToId = lastSavedId;
      linkBanner.classList.remove('active');
      form.reset();
      document.getElementById('station').value = lastStation;
      document.getElementById('time').value = lastTime;
      submitBtn.textContent = `Add Connected Item (to #${linkToId})`;
    });

    linkDoneBtn.addEventListener('click', hideLinkBanner);

    // ─── Camera & Detection ───────────────────────────────────
    const detectBtn = document.getElementById('detectBtn');
    const cameraBox = document.getElementById('cameraBox');
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');
    const captureBtn = document.getElementById('captureBtn');
    const detectStatus = document.getElementById('detectStatus');
    let stream = null;

    function fillFromDetection(data) {
      if (data.item_type) document.getElementById('item_type').value = data.item_type;
      if (data.main_color) document.getElementById('main_color').value = data.main_color;
      if (data.secondary_colors) document.getElementById('secondary_colors').value = data.secondary_colors;
      if (data.perks) document.getElementById('perks').value = data.perks;
    }

    detectBtn.addEventListener('click', async () => {
      if (stream) { stopCamera(); return; }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        video.srcObject = stream;
        cameraBox.classList.add('active');
        detectBtn.textContent = 'Close Camera';
        detectStatus.textContent = 'Point at item and click Capture.';
      } catch { alert('Camera access denied or unavailable.'); }
    });

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      cameraBox.classList.remove('active');
      detectBtn.textContent = 'Detect (Camera)';
      detectStatus.textContent = '';
    }

    captureBtn.addEventListener('click', async () => {
      if (!stream) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      captureBtn.disabled = true;
      detectStatus.textContent = 'Analyzing with VLM...';
      detectStatus.classList.add('pulse');
      try {
        const res = await fetch('/api/detect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64 }),
        });
        const data = await res.json();
        if (data.error) {
          detectStatus.textContent = 'Error: ' + data.error;
        } else {
          fillFromDetection(data);
          detectStatus.textContent = 'Detected! Fields auto-filled.';
          stopCamera();
        }
        detectStatus.classList.remove('pulse');
      } catch {
        detectStatus.textContent = 'Failed to reach detection server.';
        detectStatus.classList.remove('pulse');
      }
      captureBtn.disabled = false;
    });

    // ─── Upload Photo ─────────────────────────────────────────
    const uploadInput = document.getElementById('uploadInput');
    const uploadStatus = document.getElementById('uploadStatus');

    uploadInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      uploadStatus.textContent = 'Analyzing image...';
      uploadStatus.className = 'detect-status active pulse';

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        try {
          const res = await fetch('/api/detect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64 }),
          });
          const data = await res.json();
          if (data.error) {
            uploadStatus.textContent = 'Error: ' + data.error;
          } else {
            fillFromDetection(data);
            uploadStatus.textContent = 'Detected! Fields auto-filled.';
          }
          uploadStatus.classList.remove('pulse');
        } catch {
          uploadStatus.textContent = 'Failed to reach detection server.';
          uploadStatus.classList.remove('pulse');
        }
      };
      reader.readAsDataURL(file);
      uploadInput.value = '';
    });

    // ─── Entries CRUD ─────────────────────────────────────────
    async function loadEntries() {
      try {
        const res = await fetch('/api/entries');
        const data = await res.json();
        if (!data.length) {
          entriesDiv.innerHTML = '<div class="empty-msg">No entries yet.</div>';
          return;
        }
        let html = `<table>
          <thead><tr>
            <th>ID</th><th>Station</th><th>Item</th><th>Colors</th>
            <th>Connected</th><th>Perks</th><th>Time</th><th></th>
          </tr></thead><tbody>`;
        for (const e of data) {
          const colors = [e.main_color, e.secondary_colors].filter(Boolean).join(', ');
          const connIds = (e.connected_items || '').split(',').filter(x => x.trim());
          const connHtml = connIds.length
            ? connIds.map(id => `<span class="conn-id">#${esc(id.trim())}</span>`).join(' ')
            : '';
          html += `<tr>
            <td>#${e.id}</td>
            <td>${esc(e.station)}</td>
            <td>${esc(e.item_type)}</td>
            <td>${esc(colors)}</td>
            <td>${connHtml}</td>
            <td>${esc(e.perks)}</td>
            <td>${esc(e.time)}</td>
            <td><button class="delete-btn" onclick="deleteEntry(${e.id})">x</button></td>
          </tr>`;
        }
        html += '</tbody></table>';
        entriesDiv.innerHTML = html;
      } catch {
        entriesDiv.innerHTML = '<div class="empty-msg">Failed to load entries.</div>';
      }
    }

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const body = Object.fromEntries(new FormData(form));
      if (linkToId) body.link_to = linkToId;
      // Remember station & time for connected items
      lastStation = body.station;
      lastTime = body.time;
      try {
        const res = await fetch('/api/entries', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error();
        const result = await res.json();
        const newId = result.id;
        const wasLinked = !!linkToId;
        showStatus(status, wasLinked ? `Connected item #${newId} added (linked to #${linkToId}).` : `Entry #${newId} added.`, true);
        form.reset();
        setTimeNow();
        loadEntries();
        // Show link banner for the group parent
        showLinkBanner(wasLinked ? linkToId : newId);
        linkToId = null;
        submitBtn.textContent = 'Add Entry';
      } catch { showStatus(status, 'Failed to add entry.', false); }
    });

    async function deleteEntry(id) {
      try { await fetch('/api/entries/' + id, { method: 'DELETE' }); loadEntries(); } catch {}
    }

    // ─── Find Screen (Chat) ──────────────────────────────────
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const chatNew = document.getElementById('chatNew');
    const findMatches = document.getElementById('findMatches');
    let conversation = [];

    function addChatMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      addChatMsg(text, 'user');
      conversation.push({ role: 'user', text });

      chatSend.disabled = true;
      const thinking = addChatMsg('Checking...', 'thinking');

      try {
        const res = await fetch('/api/find', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation }),
        });
        const data = await res.json();
        thinking.remove();

        const reply = data.reply || data.error || 'No response.';
        addChatMsg(reply, 'assistant');
        conversation.push({ role: 'assistant', text: reply });

        findMatches.innerHTML = '';
        if (data.matches && data.matches.length) {
          let html = '<h2>Your Item(s)</h2><table><thead><tr>' +
            '<th>ID</th><th>Station</th><th>Item</th><th>Colors</th><th>Connected</th><th>Perks</th><th>Time</th>' +
            '</tr></thead><tbody>';
          for (const e of data.matches) {
            const colors = [e.main_color, e.secondary_colors].filter(Boolean).join(', ');
            const connIds = (e.connected_items || '').split(',').filter(x => x.trim());
            const connHtml = connIds.length
              ? connIds.map(id => `<span class="conn-id">#${esc(id.trim())}</span>`).join(' ')
              : '';
            html += `<tr>
              <td>#${e.id}</td>
              <td>${esc(e.station)}</td><td>${esc(e.item_type)}</td><td>${esc(colors)}</td>
              <td>${connHtml}</td><td>${esc(e.perks)}</td><td>${esc(e.time)}</td>
            </tr>`;
          }
          html += '</tbody></table>';
          findMatches.innerHTML = html;
        }
      } catch {
        thinking.remove();
        addChatMsg('Failed to reach server.', 'assistant');
      }
      chatSend.disabled = false;
      chatInput.focus();
    }

    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });

    chatNew.addEventListener('click', () => {
      conversation = [];
      chatMessages.innerHTML = '';
      findMatches.innerHTML = '';
      addChatMsg('Hello! I can help you find a lost item. Please describe it in as much detail as possible — item type, colors, when and where you lost it, and any distinguishing features.', 'assistant');
      chatInput.focus();
    });

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    loadEntries();
  </script>
</body>
</html>
